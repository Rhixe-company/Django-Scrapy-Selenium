{% load static i18n %}

<div class="flex w-fit items-center gap-1">
  <div class="flex flex-col">
    <span class="text-neutral-900 dark:text-white"><a href="{{ record.get_absolute_url }}">{{ record.name|title }}</a></span>
    {% if record.title %}
      <span class="text-sm text-neutral-600 opacity-85 dark:text-neutral-300">{{ record.title }}</span>
    {% endif %}
  </div>
</div>
