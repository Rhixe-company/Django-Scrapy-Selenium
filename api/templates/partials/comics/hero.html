{% load static i18n example widget_tweaks %}

<div class="flex flex-col md:flex-row items-center justify-between space-y-3 md:space-y-0 md:space-x-4 p-4">
  <div class="w-full md:w-1/2">
    <form class="flex items-center">
      <label for="{{ filter.form.title.id }}" class="sr-only">{{ filter.form.title.label }}:</label>
      <div class="relative w-full">
        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
          <svg aria-hidden="true"
               class="w-5 h-5 text-gray-500 dark:text-gray-400"
               fill="currentColor"
               viewbox="0 0 20 20"
               xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
          </svg>
        </div>
        {{ filter.form.title|add_classes:'custom_al_search_input' }}
      </div>
    </form>
  </div>
  <div class="w-full md:w-auto flex flex-col md:flex-row space-y-2 md:space-y-0 items-stretch md:items-center justify-end md:space-x-3 flex-shrink-0">
    <div x-data="{drawerCreate: false}">
      <button x-on:click="drawerCreate = true"
              type="button"
              class="flex items-center justify-center text-white bg-primary-700 hover:bg-primary-800 focus:ring-4 focus:ring-primary-300 font-medium rounded-lg text-sm px-4 py-2 dark:bg-primary-600 dark:hover:bg-primary-700 focus:outline-none dark:focus:ring-primary-800">
        <svg class="h-3.5 w-3.5 mr-2"
             fill="currentColor"
             viewbox="0 0 20 20"
             xmlns="http://www.w3.org/2000/svg"
             aria-hidden="true">
          <path clip-rule="evenodd" fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" />
        </svg>
        Create new comic
      </button>
      <div x-cloak
           x-show="drawerCreate"
           x-transition.opacity.duration.200ms
           x-trap.inert.noscroll="drawerCreate"
           x-on:keydown.esc.window="drawerCreate = false"
           x-on:click.self="drawerCreate = false"
           class="fixed right-0 top-0 z-40 h-screen p-4 overflow-y-auto   w-4/5 bg-black/30  backdrop-blur-md"
           :class="drawerCreate ? '' : 'transition-transform -translate-x-full'"
           role="dialog"
           aria-modal="true"
           aria-labelledby="ComicCreateFormTitle">
        <!-- Modal Dialog -->
        <div x-show="drawerCreate"
             x-transition:enter="transition ease-out duration-200 delay-100 motion-reduce:transition-opacity"
             x-transition:enter-start="scale-0"
             x-transition:enter-end="scale-100"
             hx-get='{% url "comics:add_comic" %}'
             hx-indicator='.progress'
             hx-trigger='intersect once'
             hx-target='#create-form'
             hx-push-url='true'
             class="flex  flex-col gap-2 rounded-sm border border-neutral-300 bg-white text-neutral-600 dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-300">
          {% include "partials/comics/create.html" %}
        </div>
      </div>
    </div>
    <div x-data="{ openActions: false, openFilter: false, openedWithKeyboard: false }">
      <div class="flex items-center space-x-3 w-full md:w-auto">
        <button @click="openFilter = !openFilter"
                aria-haspopup="false"
                @keydown.space.prevent="openedWithKeyboard = true"
                @keydown.enter.prevent="openedWithKeyboard = true"
                @keydown.down.prevent="openedWithKeyboard = true"
                :aria-expanded="openFilter || openedWithKeyboard"
                class="w-full md:w-auto flex items-center justify-center py-2 px-4 text-sm font-medium text-gray-900 focus:outline-none bg-white rounded-lg border border-gray-200 hover:bg-gray-100 hover:text-primary-700 focus:z-10 focus:ring-4 focus:ring-gray-200 dark:focus:ring-gray-700 dark:bg-gray-800 dark:text-gray-400 dark:border-gray-600 dark:hover:text-white dark:hover:bg-gray-700"
                type="button">
          <svg xmlns="http://www.w3.org/2000/svg"
               aria-hidden="true"
               class="h-4 w-4 mr-2 text-gray-400"
               viewbox="0 0 20 20"
               fill="currentColor">
            <path fill-rule="evenodd" d="M3 3a1 1 0 011-1h12a1 1 0 011 1v3a1 1 0 01-.293.707L12 11.414V15a1 1 0 01-.293.707l-2 2A1 1 0 018 17v-5.586L3.293 6.707A1 1 0 013 6V3z" clip-rule="evenodd" />
          </svg>
          Filter
          <svg class="-mr-1 ml-1.5 w-5 h-5"
               fill="currentColor"
               viewbox="0 0 20 20"
               xmlns="http://www.w3.org/2000/svg"
               aria-hidden="true">
            <path clip-rule="evenodd" fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" />
          </svg>
        </button>
        <div x-cloak
             x-show="openFilter || openedWithKeyboard"
             x-transition
             x-trap="openedWithKeyboard"
             @click.outside="openFilter = false, openedWithKeyboard = false"
             @keydown.down.prevent="$focus.wrap().next()"
             @keydown.up.prevent="$focus.wrap().previous()"
             class="z-10  w-48 p-3 bg-white rounded-lg shadow dark:bg-gray-700">
          <h6 class="mb-3 text-sm font-medium text-gray-900 dark:text-white">{{ filter.form.type.label }}</h6>
          <ul class="space-y-2 text-sm">
            {{ filter.form.type }}
          </ul>
        </div>
        <button @click="openActions = !openActions"
                aria-haspopup="true"
                @keydown.space.prevent="openedWithKeyboard = true"
                @keydown.enter.prevent="openedWithKeyboard = true"
                @keydown.down.prevent="openedWithKeyboard = true"
                :aria-expanded="openActions || openedWithKeyboard"
                class="w-full md:w-auto flex items-center justify-center py-2 px-4 text-sm font-medium text-gray-900 focus:outline-none bg-white rounded-lg border border-gray-200 hover:bg-gray-100 hover:text-primary-700 focus:z-10 focus:ring-4 focus:ring-gray-200 dark:focus:ring-gray-700 dark:bg-gray-800 dark:text-gray-400 dark:border-gray-600 dark:hover:text-white dark:hover:bg-gray-700"
                type="button">
          <svg class="-ml-1 mr-1.5 w-5 h-5"
               fill="currentColor"
               viewbox="0 0 20 20"
               xmlns="http://www.w3.org/2000/svg"
               aria-hidden="true">
            <path clip-rule="evenodd" fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" />
          </svg>
          Actions
        </button>
        <div x-cloak
             x-show="openActions || openedWithKeyboard"
             x-transition
             x-trap="openedWithKeyboard"
             @click.outside="openActions = false, openedWithKeyboard = false"
             @keydown.down.prevent="$focus.wrap().next()"
             @keydown.up.prevent="$focus.wrap().previous()"
             class=" z-10 w-44 bg-white rounded divide-y divide-gray-100 shadow dark:bg-gray-700 dark:divide-gray-600">
          <ul class="py-1 text-sm text-gray-700 dark:text-gray-200">
            <li>
              <a href="#"
                 class="block py-2 px-4 hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white">Mass Edit</a>
            </li>
          </ul>
          <div class="py-1">
            <a href="#"
               class="block py-2 px-4 text-sm text-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 dark:text-gray-200 dark:hover:text-white">Delete all</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
